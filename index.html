<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDP | Rastreio Industrial</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0d0e12; --blue: #00f2ff; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #main-content { display: none; width: 100%; align-items: center; flex-direction: column; }
        #loading-supreme { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner-supreme { width: 50px; height: 50px; border: 5px solid transparent; border-top: 5px solid #22c55e; border-right: 5px solid #eab308; border-bottom: 5px solid #3b82f6; border-left: 5px solid #a855f7; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .input-id { width: 100%; max-width: 400px; padding: 15px; border-radius: 8px; background: #000; color: #fff; border: 1px solid #333; margin-bottom: 10px; text-transform: uppercase; }
        .btn-rastrear { width: 100%; max-width: 400px; padding: 15px; background: var(--blue); border: none; border-radius: 8px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loading-supreme">
        <div class="spinner-supreme"></div>
        <p style="color:#bf953f; margin-top: 15px;">SINCRONIZANDO NAVE JDP...</p>
    </div>

    <div id="main-content">
        <h1>STATUS INDUSTRIAL</h1>
        <input type="text" id="input-id" class="input-id" placeholder="CÓDIGO DO PEDIDO">
        <button class="btn-rastrear" onclick="rastrearPedido()">BUSCAR STATUS</button>
        <div id="painel-resultado" style="margin-top: 20px; font-weight: bold;"></div>
    </div>

    <script>
        const config = { databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();
        const LOJA_ID = 'LEOVARDIOS_burguer_2026';

        function verificarRede() {
            const loader = document.getElementById('loading-supreme');
            const content = document.getElementById('main-content');
            if (navigator.onLine) { loader.style.display = 'none'; content.style.display = 'flex'; }
            else { loader.style.display = 'flex'; content.style.display = 'none'; }
        }

        window.addEventListener('load', verificarRede);
        window.addEventListener('online', verificarRede);
        window.addEventListener('offline', verificarRede);

        function rastrearPedido() {
            const idInput = document.getElementById('input-id').value.trim();
            if (!idInput) return;

            db.ref(`lojas/${LOJA_ID}/rastreio_ativo/${idInput}`).once('value', (snapshot) => {
                const dados = snapshot.val();
                const painel = document.getElementById('painel-resultado');
                const btnExistente = document.getElementById('btn-monitor-flutuante');
                
                if (btnExistente) btnExistente.remove();

                if (!dados) {
                    painel.innerHTML = "PEDIDO NÃO ENCONTRADO.";
                    return;
                }

                painel.innerHTML = `Pedido: ${idInput} | Status: <strong>${dados.status}</strong>`;

                if (dados.status === "A_CAMINHO" || dados.status === "PRONTO_PARA_ENTREGA") {
                    const btn = document.createElement('button');
                    btn.id = 'btn-monitor-flutuante';
                    btn.innerHTML = "ACOMPANHAR ROTA EM TEMPO REAL";
                    btn.style.cssText = `
                        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                        padding: 18px 30px; 
                        background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); 
                        color: #000; border: none; border-radius: 50px; font-weight: 900; 
                        z-index: 9999; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer;
                    `;
                    
                    // CORREÇÃO: Adicionado ?id= para o parâmetro ser reconhecido
                    btn.onclick = function() {
                        window.location.href = "https://pradodalapa-hue.github.io/Test/?id=" + encodeURIComponent(idInput);
                    };
                    
                    document.body.appendChild(btn);
                }
            });
        }
    </script>
</body>
</html>
